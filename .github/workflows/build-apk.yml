# 云端构建 APK - 无需本地安装 Android Studio
# 将项目推送到 GitHub 后，此工作流会自动构建可安装的 APK
name: 构建 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许在 GitHub 网页上手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: 生成 Gradle Wrapper
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
          unzip -q gradle.zip
          chmod +x gradle-8.2/bin/gradle
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2

      - name: 缓存 Gradle
        uses: gradle/gradle-build-action@v3

      - name: 构建 APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: FloatingMosaic-APK
          path: app/build/outputs/apk/debug/app-debug.apk
